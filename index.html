<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BG Remover - 一键去除图片背景</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      max-width: 600px;
      width: 100%;
    }

    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 10px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
    }

    .upload-area {
      border: 3px dashed #ddd;
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
    }

    .upload-area:hover {
      border-color: #667eea;
      background: #f8f9ff;
    }

    .upload-area.dragover {
      border-color: #667eea;
      background: #f0f3ff;
    }

    .upload-area input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .upload-icon {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .upload-text {
      color: #666;
    }

    .upload-text strong {
      color: #667eea;
    }

    .preview-area {
      display: none;
      margin-top: 30px;
    }

    .preview-area.show {
      display: block;
    }

    .preview-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .preview-box {
      text-align: center;
    }

    .preview-box h3 {
      font-size: 14px;
      color: #666;
      margin-bottom: 10px;
    }

    .preview-box img {
      max-width: 100%;
      border-radius: 8px;
      border: 1px solid #eee;
      background: repeating-conic-gradient(#eee 0% 25%, transparent 0% 50%) 50% / 20px 20px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      margin-top: 20px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-success {
      background: #10b981;
      color: white;
    }

    .btn-success:hover {
      background: #059669;
    }

    .loading {
      display: none;
      text-align: center;
      margin-top: 20px;
    }

    .loading.show {
      display: block;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .tips {
      margin-top: 20px;
      padding: 15px;
      background: #f8f9fa;
      border-radius: 8px;
      font-size: 13px;
      color: #666;
    }

    @media (max-width: 480px) {
      .preview-grid {
        grid-template-columns: 1fr;
      }
      
      .container {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🖼️ BG Remover</h1>
    <p class="subtitle">一键去除图片背景</p>

    <div class="upload-area" id="uploadArea">
      <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp">
      <div class="upload-icon">📁</div>
      <p class="upload-text">点击或拖拽图片到这里<br><strong>支持 JPG, PNG, WEBP</strong></p>
    </div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>正在处理...</p>
    </div>

    <div class="preview-area" id="previewArea">
      <div class="preview-grid">
        <div class="preview-box">
          <h3>原图</h3>
          <img id="originalImg" src="" alt="Original">
        </div>
        <div class="preview-box">
          <h3>结果</h3>
          <img id="resultImg" src="" alt="Result">
        </div>
      </div>
      <button class="btn btn-success" id="downloadBtn">下载透明背景图片</button>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const uploadArea = document.getElementById('uploadArea');
    const loading = document.getElementById('loading');
    const previewArea = document.getElementById('previewArea');
    const originalImg = document.getElementById('originalImg');
    const resultImg = document.getElementById('resultImg');
    const downloadBtn = document.getElementById('downloadBtn');

    // TODO: 替换为你的 Cloudflare Workers 域名
    const API_URL = 'https://your-workers-name.subdomain.workers.dev';

    let currentFile = null;
    let resultBlob = null;

    // 拖拽上传
    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file) handleFile(file);
    });

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) handleFile(file);
    });

    function handleFile(file) {
      if (!file.type.match(/image\/(jpeg|png|webp)/)) {
        alert('请上传 JPG、PNG 或 WEBP 格式的图片');
        return;
      }

      currentFile = file;
      const reader = new FileReader();
      reader.onload = (e) => {
        originalImg.src = e.target.result;
      };
      reader.readAsDataURL(file);

      // 自动开始处理
      processImage(file);
    }

    async function processImage(file) {
      previewArea.classList.remove('show');
      loading.classList.add('show');

      const formData = new FormData();
      formData.append('image', file);

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          body: formData,
        });

        if (!response.ok) {
          throw new Error('处理失败，请重试');
        }

        resultBlob = await response.blob();
        const resultUrl = URL.createObjectURL(resultBlob);
        resultImg.src = resultUrl;

        previewArea.classList.add('show');
      } catch (error) {
        alert(error.message);
      } finally {
        loading.classList.remove('show');
      }
    }

    downloadBtn.addEventListener('click', () => {
      if (!resultBlob) return;
      
      const url = URL.createObjectURL(resultBlob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'removed-bg.png';
      a.click();
      URL.revokeObjectURL(url);
    });
  </script>
</body>
</html>
